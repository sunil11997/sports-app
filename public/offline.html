<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Offline - My Sports App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #000000;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }
        .icon-container {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .icon {
            font-size: 50px;
        }
        h1 {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            margin: 0 0 10px 0;
            font-size: 28px;
        }
        p {
            opacity: 0.6;
            font-weight: 500;
            max-width: 280px;
            line-height: 1.5;
            font-size: 16px;
            margin: 0;
        }
        .status-badge {
            margin-top: 20px;
            background: #ff3b30;
            color: white;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        button {
            margin-top: 40px;
            padding: 18px 50px;
            border-radius: 20px;
            border: none;
            background-color: #ffffff;
            color: #000000;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            letter-spacing: 0.05em;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        button:active {
            transform: scale(0.96);
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="icon-container">
        <div class="icon">📡</div>
    </div>
    <h1>No Connection</h1>
    <p>Your institutional data is safe and stored locally, but a connection is needed to sync.</p>
    <div class="status-badge">Offline Mode</div>
    <button onclick="window.location.reload()">Retry Connection</button>
</body>
</html>
