<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Sports App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #1a1a1a;
            text-align: center;
            padding: 20px;
        }
        .icon {
            width: 80px;
            height: 80px;
            background: #f0f0f0;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }
        h1 { font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em; margin-bottom: 8px; }
        p { color: #666; font-weight: 500; margin-bottom: 32px; max-width: 300px; line-height: 1.5; }
        button {
            background: #000;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>
    <h1>You're Offline</h1>
    <p>Check your internet connection and try refreshing the page.</p>
    <button onclick="window.location.reload()">Retry Connection</button>
</body>
</html>
