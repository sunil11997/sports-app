<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - My Sports App</title>
  <style>
    body {
      background-color: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    h2 {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: -0.025em;
    }
    p {
      font-size: 1rem;
      opacity: 0.7;
      margin-bottom: 2rem;
    }
    .status-icon {
      width: 64px;
      height: 64px;
      margin-bottom: 2rem;
      opacity: 0.5;
    }
    button {
      background-color: #ffffff;
      color: #000000;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
  </svg>
  <h2>You are offline</h2>
  <p>Check your internet connection to access live features. Core records are available via local storage.</p>
  <button onclick="window.location.reload()">Retry Connection</button>
</body>
</html>
