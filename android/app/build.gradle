apply plugin: 'com.android.application'

android {
    namespace "com.sunil.physical"
    compileSdk project.ext.compileSdkVersion ?: 34
    defaultConfig {
        applicationId "com.sunil.physical"
        minSdkVersion project.ext.minSdkVersion ?: 22
        targetSdkVersion project.ext.targetSdkVersion ?: 34
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Allows to pass additional arguments to the aapt tool
             ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:fpx:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    lintOptions {
        checkReleaseBuilds false
    }
}

repositories {
    flatDir{
        dirs 'libs'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation "androidx.appcompat:androidx.appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$androidxCoreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')
    
    // Native YouTube Player Core
    implementation 'com.pierfrancescosoffritti.androidyoutubeplayer:core:12.1.0'
    
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:core-espresso-3.5.1"
}

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. This is fine.")
}
